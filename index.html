<!DOCTYPE html>
<html>
<head>
  <title>GAG Values</title>
</head>
<body>
  <h1>GAG Values</h1>
  <div id="app">Loading...</div>

  <script>
    fetch('items.json')
      .then(res => res.json())
      .then(data => {
        const items = data.items;

        document.getElementById('app').innerHTML =
          items.map(i => `<p>${i.icon} ${i.name} - ¢${i.value}</p>`).join('');
      })
      .catch(err => {
        document.getElementById('app').innerHTML = "Error loading data";
        console.error(err);
      });
  </script>
</body>
</html>
