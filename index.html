<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GAG Values</title>
<style>
:root{--g:#2a9e40;--g2:#e8f7eb;--bg:#fff;--sf:#f8faf8;--bd:#ebebeb;--tx:#111;--sub:#999;--hov:#f4faf5}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;-webkit-font-smoothing:antialiased}

/* HEADER */
.hdr{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--bd);padding:13px 20px 0}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.logo{font-size:15px;font-weight:700;letter-spacing:-.3px;flex:1;white-space:nowrap}
.logo em{color:var(--g);font-style:normal}
/* Highlighted timestamp */
.ts-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--g);background:var(--g2);border:1px solid #c5e8cb;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.ts-badge svg{flex-shrink:0}
/* Search */
.sb{position:relative}
.sb svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#bbb;pointer-events:none}
input{width:100%;padding:9px 12px 9px 32px;border:1px solid var(--bd);border-radius:8px;font-size:13.5px;outline:none;background:var(--sf);color:var(--tx);transition:border .12s}
input:focus{border-color:var(--g);background:#fff}
/* Tabs */
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--bd);margin-top:10px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 14px;font-size:12.5px;font-weight:500;color:var(--sub);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:color .12s,border-color .12s;margin-bottom:-1px}
.tab.on{color:var(--g);border-bottom-color:var(--g);font-weight:600}
.tab:hover:not(.on){color:#444}

/* SORT + COUNT */
.meta{display:flex;align-items:center;justify-content:space-between;padding:9px 20px;gap:8px}
.cnt{font-size:11.5px;color:var(--sub);flex-shrink:0}
.sorts{display:flex;gap:4px}
.sb2{font-size:11.5px;padding:4px 9px;border-radius:6px;border:1px solid var(--bd);background:none;cursor:pointer;color:var(--sub);font-weight:500;transition:all .1s}
.sb2.on{background:var(--g);color:#fff;border-color:var(--g)}

/* TOP 10 */
.sec{padding:0 20px 10px}
.sec-ttl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:#bbb;margin-bottom:9px}
.t10g{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:6px}
.t10c{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--bd);border-radius:9px;background:var(--sf);transition:background .1s}
.t10c:hover{background:var(--hov)}
.t10r{font-size:10px;font-weight:800;color:#ddd;width:14px;flex-shrink:0}
.t10r.g{color:#f5a623}.t10r.s{color:#9aa0a8}.t10r.b{color:#b87333}
.t10i{font-size:16px;line-height:1;flex-shrink:0}
.t10b{flex:1;min-width:0}
.t10n{font-size:11.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t10v{font-size:12.5px;font-weight:800;color:var(--g)}
hr{border:none;border-top:1px solid var(--bd);margin:4px 0 0}

/* LIST */
.list{padding:0 20px 48px}
.row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd);transition:background .1s;cursor:default}
.row:last-child{border-bottom:none}
.row:hover{background:var(--hov);margin:0 -20px;padding-left:20px;padding-right:20px}

/* Tier highlights */
.row.tier-s{background:#fffdf3}.row.tier-s:hover{background:#fff8e0}
.row.tier-a{background:#fdf4ff}.row.tier-a:hover{background:#f9e9ff}
.row.tier-b{background:#f4faff}.row.tier-b:hover{background:#e8f3ff}

.r-icon{font-size:20px;width:26px;text-align:center;flex-shrink:0;line-height:1}
.r-body{flex:1;min-width:0}
.r-name{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.r-cat{font-size:11px;color:var(--sub);margin-top:1px}
.r-right{flex-shrink:0;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.r-val{font-size:17px;font-weight:800;color:var(--g);letter-spacing:-.4px;line-height:1}
.r-cur{font-size:10px;font-weight:500;color:#c0c0c0;letter-spacing:0}

/* Tier badge */
.tbadge{font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;letter-spacing:.3px;flex-shrink:0}
.tbadge.fire{background:#fff0e0;color:#e07020}
.tbadge.rare{background:#f3e8ff;color:#8b30cc}
.tbadge.good{background:#e8f0ff;color:#3060cc}

/* EMPTY */
.empty{padding:50px 20px;text-align:center;color:#bbb;font-size:13px}

@media(max-width:400px){
  .hdr,.sec,.list,.meta{padding-left:14px;padding-right:14px}
  .row:hover{margin:0 -14px;padding-left:14px;padding-right:14px}
  .r-val{font-size:15px}
  .ts-badge{font-size:10.5px}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="logo">🌱 <em>GAG</em> Values</div>
    <div class="ts-badge" id="ts">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <span></span>
    </div>
  </div>
  <div class="sb">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="q" placeholder="Search items…" autocomplete="off" spellcheck="false"/>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<div class="meta">
  <span class="cnt" id="cnt"></span>
  <div class="sorts" id="sorts"></div>
</div>

<div id="t10wrap">
  <div class="sec">
    <div class="sec-ttl">🏆 Top 10 Highest Value</div>
    <div class="t10g" id="t10"></div>
  </div>
  <hr/>
</div>

<div class="list" id="list"></div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG — point this at your hosted items.json
// ═══════════════════════════════════════════════════
const DATA_URL = "items.json";

// ═══════════════════════════════════════════════════
// FORMAT
// ═══════════════════════════════════════════════════
const fmt = n => {
  if(n>=1e12) return (n/1e12).toFixed(n%1e12?1:0)+'T';
  if(n>=1e9)  return (n/1e9).toFixed(n%1e9?1:0)+'B';
  if(n>=1e6)  return (n/1e6).toFixed(n%1e6?1:0)+'M';
  if(n>=1e3)  return (n/1e3).toFixed(n%1e3?1:0)+'K';
  return n.toString();
};

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
const CATS = ["All","Seeds","Gear","Eggs","Crops","Pets"];
const SORTS = [{k:"high",l:"High → Low"},{k:"low",l:"Low → High"},{k:"az",l:"A → Z"}];
let tab="All", q="", sort="high";
let DATA = null;

// Tier helpers — computed after data loads
let p95,p85,p70;
function buildTiers(items){
  const vals=[...items].map(x=>x.v).sort((a,b)=>a-b);
  p95=vals[Math.floor(vals.length*.95)];
  p85=vals[Math.floor(vals.length*.85)];
  p70=vals[Math.floor(vals.length*.70)];
}
function tier(v){
  if(v>=p95) return "s";
  if(v>=p85) return "a";
  if(v>=p70) return "b";
  return "";
}
const BADGE={s:`<span class="tbadge fire">🔥 HOT</span>`,a:`<span class="tbadge rare">★ RARE</span>`,b:`<span class="tbadge good">↑ HIGH</span>`};

// ═══════════════════════════════════════════════════
// FETCH + INIT
// ═══════════════════════════════════════════════════
async function loadData(){
  try {
    const res = await fetch('items.json');    
    if(!res.ok) throw new Error("HTTP "+res.status);
    const json = await res.json();
    // Normalise keys: support both {name,category,value,icon} and {n,c,v,i}
    DATA = {
      lastUpdated: json.lastUpdated,
      items: json.items.map(x=>({
        n: x.name ?? x.n,
        c: x.category ?? x.c,
        v: x.value ?? x.v,
        i: x.icon ?? x.i
      }))
    };
  } catch(e) {
    document.getElementById("list").innerHTML=`<div class="empty">⚠️ Could not load items.json</div>`;
    return;
  }
  buildTiers(DATA.items);
  document.querySelector("#ts span").textContent = DATA.lastUpdated;

// Tabs
const tabsEl = document.getElementById("tabs");
CATS.forEach(c=>{
  const b=document.createElement("button");
  b.className="tab"+(c==="All"?" on":""); b.textContent=c;
  b.onclick=()=>{tab=c;document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));b.classList.add("on");render();

// Boot
loadData();};
  tabsEl.appendChild(b);
});

// Sort buttons
const sortsEl=document.getElementById("sorts");
SORTS.forEach(s=>{
  const b=document.createElement("button");
  b.className="sb2"+(s.k===sort?" on":""); b.textContent=s.l;
  b.onclick=()=>{sort=s.k;document.querySelectorAll(".sb2").forEach(x=>x.classList.remove("on"));b.classList.add("on");render();};
  sortsEl.appendChild(b);
});

  // Search
  document.getElementById("q").addEventListener("input",e=>{q=e.target.value.toLowerCase();render();});

  // Top 10
  const rc=["g","g","g","s","s","","","","",""];
  document.getElementById("t10").innerHTML=[...DATA.items].sort((a,b)=>b.v-a.v).slice(0,10).map((it,i)=>`
    <div class="t10c">
      <span class="t10r ${rc[i]}">#${i+1}</span>
      <span class="t10i">${it.i}</span>
      <div class="t10b"><div class="t10n">${it.n}</div><div class="t10v">¢${fmt(it.v)}</div></div>
    </div>`).join("");

  render();
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function render(){
  const searching=q.length>0;
  document.getElementById("t10wrap").style.display=searching?"none":"";

  let items=DATA.items.filter(it=>(tab==="All"||it.c===tab)&&(!q||it.n.toLowerCase().includes(q)));
  if(sort==="high") items.sort((a,b)=>b.v-a.v);
  else if(sort==="low") items.sort((a,b)=>a.v-b.v);
  else items.sort((a,b)=>a.n.localeCompare(b.n));

  document.getElementById("cnt").textContent=items.length+" item"+(items.length!==1?"s":"");

  const el=document.getElementById("list");
  if(!items.length){el.innerHTML=`<div class="empty">No items match "<strong>${q}</strong>"</div>`;return;}

  el.innerHTML=items.map(it=>{
    const t=tier(it.v);
    return `<div class="row${t?" tier-"+t:""}">
      <span class="r-icon">${it.i}</span>
      <div class="r-body">
        <div class="r-name">${it.n}${t?BADGE[t]:""}</div>
        <div class="r-cat">${it.c}</div>
      </div>
      <div class="r-right">
        <div class="r-val">¢${fmt(it.v)}</div>
        <div class="r-cur">Sheckles</div>
      </div>
    </div>`;
  }).join("");
}

render();
</script>
</body>
</html>
